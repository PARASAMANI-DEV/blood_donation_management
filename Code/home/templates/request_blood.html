{% extends 'base.html' %}

{% block title %} Blood Donation {% endblock %}

{% block css %}
<style>
    /* Emergency Pulse Animation */
    @keyframes emergencyPulse {

        0%,
        100% {
            box-shadow: 0 0 30px rgba(142, 14, 0, 0.6),
                0 0 60px rgba(142, 14, 0, 0.3);
        }

        50% {
            box-shadow: 0 0 40px rgba(142, 14, 0, 0.8),
                0 0 80px rgba(142, 14, 0, 0.5);
        }
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    body {
        font-family: 'Poppins', sans-serif;
        color: #444;
    }

    /* Glassmorphic Emergency Container with Red Glow */
    .container {
        max-width: 650px;
        margin: 50px auto;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.25);
        box-shadow: 0 0 30px rgba(142, 14, 0, 0.4),
            0 0 60px rgba(142, 14, 0, 0.2),
            0 8px 32px rgba(0, 0, 0, 0.1);
        border-radius: 20px;
        padding: 40px;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        animation: fadeIn 0.6s ease-out, emergencyPulse 3s ease-in-out infinite;
        position: relative;
    }

    .container::before {
        content: '🚨 EMERGENCY';
        position: absolute;
        top: -15px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(142, 14, 0, 0.9);
        color: white;
        padding: 5px 20px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 2px;
        box-shadow: 0 0 20px rgba(142, 14, 0, 0.6);
    }

    .container:hover {
        transform: scale(1.02);
        box-shadow: 0 0 40px rgba(142, 14, 0, 0.6),
            0 0 80px rgba(142, 14, 0, 0.3),
            0 12px 40px rgba(0, 0, 0, 0.15);
    }

    h3 {
        text-align: center;
        font-weight: 700;
        color: #8E0E00;
        font-size: 2rem;
        margin-bottom: 30px;
        text-shadow: 0 0 20px rgba(142, 14, 0, 0.3);
    }

    label {
        font-weight: 600;
        color: #333;
        margin-bottom: 8px;
        display: block;
    }

    input,
    textarea,
    select {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(142, 14, 0, 0.2);
        border-radius: 10px;
        padding: 12px 15px;
        font-size: 15px;
        width: 100%;
        box-sizing: border-box;
        transition: all 0.3s ease;
        font-family: 'Poppins', sans-serif;
    }

    input:focus,
    textarea:focus,
    select:focus {
        border-color: rgba(142, 14, 0, 0.6);
        outline: none;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 0 15px rgba(142, 14, 0, 0.3);
    }

    /* Emergency Button with Red Glow */
    button {
        background: rgba(142, 14, 0, 0.9);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        padding: 15px 40px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: block;
        margin: 30px auto 0;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(142, 14, 0, 0.5);
    }

    button::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        transition: width 0.6s, height 0.6s;
    }

    button:hover {
        background: rgba(160, 16, 0, 1);
        transform: translateY(-3px) scale(1.05);
        box-shadow: 0 0 30px rgba(142, 14, 0, 0.8),
            0 0 60px rgba(142, 14, 0, 0.4);
    }

    button:hover::before {
        width: 300px;
        height: 300px;
    }

    button:active {
        transform: translateY(-1px) scale(1.02);
    }

    .form-group {
        margin-bottom: 20px;
    }

    textarea {
        resize: vertical;
        min-height: 80px;
    }

    select {
        cursor: pointer;
    }
</style>

{% endblock %}

{% block body %}
<div class="container">
    <h3>Request For Blood</h3>
    <form method="POST"> {% csrf_token %}
        <div class="row mt-4">
            <div class="form-group col-md-12">
                <label>Full Name</label>
                <input type="text" class="form-control" name="name" id="name" placeholder="Enter Name" required>
            </div>
        </div>

        <div class="row mt-1">
            <div class="form-group col-md-6">
                <label>Email ID</label>
                <input type="email" class="form-control" name="email" id="email" placeholder="Enter Email ID" required>
            </div>
            <div class="form-group col-md-6">
                <label>Contact Number</label>
                <input type="tel" class="form-control" name="phone" id="phone" placeholder="Enter Contact Number"
                    required>
            </div>
        </div>

        <div class="row mt-1">
            <div class="form-group col-md-6">
                <label>State</label>
                <input type="text" class="form-control" name="state" id="state" placeholder="Enter State" required>
            </div>
            <div class="form-group col-md-6">
                <label>City</label>
                <input type="text" class="form-control" name="city" id="city" placeholder="Enter City" required>
            </div>
        </div>

        <div class="row mt-1">
            <div class="form-group col-md-12">
                <label>Address</label>
                <textarea class="form-control" id="address" name="address" rows="3" placeholder="Enter Address"
                    required></textarea>
            </div>
        </div>

        <div class="row mt-1">
            <div class="form-group col-md-6">
                <label>Blood Group</label>
                <select class="form-control" name="blood_group" required>
                    <option>A+</option>
                    <option>A-</option>
                    <option>B+</option>
                    <option>B-</option>
                    <option>O+</option>
                    <option>O-</option>
                    <option>AB+</option>
                    <option>AB-</option>
                </select>
            </div>
            <div class="form-group col-md-6">
                <label>Date Of Donation</label>
                <input type="date" class="form-control" id="date" name="date" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
</div>
{% endblock %}
